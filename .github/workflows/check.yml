name: Check IPTV Sources

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-sources:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Fetch sources from GitHub
        run: python main.py fetch
        
      - name: Check source availability
        run: python main.py check
        
      - name: Classify and save
        run: python main.py classify
        
      - name: Commit updated sources
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add sources/ raw/ logs/
          git diff --staged --quiet || (git commit -m "Update sources $(date +%Y-%m-%d)" && git push)
